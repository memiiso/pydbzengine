name: Release

on:
  push:
    tags:
      - '**' # Triggers on any tag push

permissions:
  contents: read

jobs:
  build:
    name: Build & verify distributions
    if: github.repository_owner == 'memiiso'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Resolves correct version if using setuptools-scm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check --strict dist/*

      - name: Smoke-test wheel install
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "from pydbzengine import DebeziumJsonEngine; print('Success')"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (rc tags)
    needs: build
    if: ${{ contains(github.ref_name, 'rc') }}
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write # Required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI (final tags)
    needs: build
    if: ${{ !contains(github.ref_name, 'rc') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1